name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_run:
    workflows: ["Deploy Backend"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'web/package.json'

    - name: Download stack outputs (if available)
      uses: actions/download-artifact@v4
      with:
        name: stack-outputs
        path: .
      continue-on-error: true

    - name: Extract environment variables
      id: env-vars
      run: |
        if [ -f stack-outputs.json ]; then
          echo "Stack outputs found, extracting values..."
          API_URL=$(jq -r '.[] | select(.OutputKey=="ApiUrl") | .OutputValue' stack-outputs.json)
          USER_POOL_ID=$(jq -r '.[] | select(.OutputKey=="UserPoolId") | .OutputValue' stack-outputs.json)
          USER_POOL_CLIENT_ID=$(jq -r '.[] | select(.OutputKey=="UserPoolClientId") | .OutputValue' stack-outputs.json)
          USER_POOL_DOMAIN=$(jq -r '.[] | select(.OutputKey=="UserPoolDomain") | .OutputValue' stack-outputs.json)
          
          echo "VITE_API_URL=${API_URL}" >> $GITHUB_ENV
          echo "VITE_USER_POOL_ID=${USER_POOL_ID}" >> $GITHUB_ENV
          echo "VITE_USER_POOL_CLIENT_ID=${USER_POOL_CLIENT_ID}" >> $GITHUB_ENV
          echo "VITE_USER_POOL_DOMAIN=${USER_POOL_DOMAIN}" >> $GITHUB_ENV
        else
          echo "No stack outputs found, using placeholder values..."
          echo "VITE_API_URL=https://api.placeholder.com" >> $GITHUB_ENV
          echo "VITE_USER_POOL_ID=placeholder" >> $GITHUB_ENV
          echo "VITE_USER_POOL_CLIENT_ID=placeholder" >> $GITHUB_ENV
          echo "VITE_USER_POOL_DOMAIN=https://placeholder.auth.region.amazoncognito.com" >> $GITHUB_ENV
        fi

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Build
      run: |
        cd web
        npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './web/dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
