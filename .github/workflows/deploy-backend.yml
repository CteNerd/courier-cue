name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'template.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup SAM
      uses: aws-actions/setup-sam@v2
      with:
        use-installer: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'src/handlers/package.json'

    - name: Install dependencies
      run: |
        cd src/handlers
        npm ci

    - name: SAM validate
      run: sam validate

    - name: SAM build
      run: sam build

    - name: SAM deploy
      run: |
        sam deploy \
          --no-confirm-changeset \
          --no-fail-on-empty-changeset \
          --stack-name courier-cue-backend \
          --parameter-overrides Environment=prod GitHubPagesUrl=https://${{ github.repository_owner }}.github.io/courier-cue \
          --capabilities CAPABILITY_IAM \
          --region ${{ secrets.AWS_REGION }} \
          --resolve-s3

    - name: Export stack outputs
      run: |
        aws cloudformation describe-stacks \
          --stack-name courier-cue-backend \
          --region ${{ secrets.AWS_REGION }} \
          --query 'Stacks[0].Outputs' > stack-outputs.json

    - name: Upload stack outputs
      uses: actions/upload-artifact@v4
      with:
        name: stack-outputs
        path: stack-outputs.json
        retention-days: 30
