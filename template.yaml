AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  courier-cue
  
  Serverless web app foundation with API Gateway, Lambda, Cognito, and DynamoDB

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
    Runtime: nodejs20.x
    Environment:
      Variables:
        TABLE_NAME: !Ref CourierTable
        USER_POOL_ID: !Ref UserPool
        USER_POOL_CLIENT_ID: !Ref UserPoolClient

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name
  GitHubPagesUrl:
    Type: String
    Default: https://ctenerd.github.io/courier-cue
    Description: GitHub Pages URL for Cognito callbacks

Resources:
  # API Gateway
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      OpenApiVersion: 3.0.1

  # Lambda Functions
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: health.handler
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /health
            Method: GET

  # Order Functions
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.createOrder
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders
            Method: POST
        CreateOrderOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders
            Method: OPTIONS

  AssignOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.assignOrder
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        AssignOrder:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/assign
            Method: PATCH
        AssignOrderOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/assign
            Method: OPTIONS

  StartDeliveryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.startDelivery
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        StartDelivery:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/start
            Method: POST
        StartDeliveryOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/start
            Method: OPTIONS

  CompleteDeliveryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.completeDelivery
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        CompleteDelivery:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/complete
            Method: POST
        CompleteDeliveryOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/complete
            Method: OPTIONS

  CancelOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.cancelOrder
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        CancelOrder:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/cancel
            Method: POST
        CancelOrderOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}/cancel
            Method: OPTIONS

  ListOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.listOrders
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        ListOrders:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders
            Method: GET
        ListOrdersOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders
            Method: OPTIONS

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: orders.getOrder
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}
            Method: GET
        GetOrderOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/orders/{orderId}
            Method: OPTIONS

  # Driver Functions
  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: drivers.listDrivers
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        ListDrivers:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers
            Method: GET
        ListDriversOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers
            Method: OPTIONS

  GetDriverProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: drivers.getDriverProfile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        GetDriverProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/me
            Method: GET
        GetDriverProfileOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/me
            Method: OPTIONS

  UpdateDriverProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: drivers.updateDriverProfile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        UpdateDriverProfile:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/me
            Method: PUT
        UpdateDriverProfileOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/me
            Method: OPTIONS

  CreateDriverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: drivers.createDriver
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        CreateDriver:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers
            Method: POST
        CreateDriverOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers
            Method: OPTIONS

  GetDriverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: drivers.getDriver
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CourierTable
      Events:
        GetDriver:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/{driverId}
            Method: GET
        GetDriverOptions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/v1/drivers/{driverId}
            Method: OPTIONS

  # DynamoDB Table
  CourierTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub courier-table-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub courier-users-${Environment}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: "Your verification code is {####}"
      EmailVerificationSubject: "Verify your email for Courier Cue"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: given_name
          Required: false
          Mutable: true
        - Name: family_name
          Required: false
          Mutable: true

  # Cognito User Pool Client
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub courier-client-${Environment}
      GenerateSecret: false
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub "${GitHubPagesUrl}/"
        - !Sub "${GitHubPagesUrl}/callback"
      LogoutURLs:
        - !Sub "${GitHubPagesUrl}/"
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # Cognito User Pool Domain
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub courier-${Environment}-${AWS::AccountId}
      UserPoolId: !Ref UserPool

  # Cognito Groups
  DispatcherGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: dispatcher
      UserPoolId: !Ref UserPool
      Description: Dispatchers who assign orders

  DriverGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: driver
      UserPoolId: !Ref UserPool
      Description: Drivers who deliver orders

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: System administrators

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  UserPoolDomain:
    Description: "Cognito User Pool Domain"
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolDomain

  TableName:
    Description: "DynamoDB table name"
    Value: !Ref CourierTable
    Export:
      Name: !Sub ${AWS::StackName}-TableName
